<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css"> <!-- Link to external CSS -->
  <script src="./app.js" defer></script> <!-- Link to external JavaScript -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  
  <div class="card">
   <div class="search">
    <input type="text" class="search-bar"
           placeholder="search"><button><i class="fa-solid fa-magnifying-glass"></i></button>  
  </div>
  
 <div class="weather loading">
    
   <h2 class="city">Weather in Denver</h2>  
    
   <h1 class="temp">51°C</h1>
   
    <div class="flex">
    <img src="https://openweathermap.org/img/wn/04n.png"
         alt="" class="icon">
      <div class="description">Cloudy</div>
    </div>
      
   <div class="humidity">Humidity 60%</div>
   
   <div class="wind">Wind Speed:6.2km/h</div>
   <div class="feels-like">Feels like 48°C</div>
   
   <div class="min-temp">Min Temp: 45°C</div>
   <div class="max-temp">Max-Temp: 55°C</div> 
      
  </div>  
  <script src="script.js">
  </script> 
</body>
</html>
